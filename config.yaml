# Laser Eyes Configuration
# Customize these parameters for your specific setup

# ============================================================================
# Loop Control
# ============================================================================
loop_rate_hz: 30  # Target update frequency (Hz)

# ============================================================================
# Model Paths
# ============================================================================
models:
  pose: "yolo/yolo11n-pose.pt"      # Trained 5-keypoint face detection model
  laser: "path/to/laser_detector_best.pt"   # Trained laser dot detection model

# ============================================================================
# Camera Calibration
# ============================================================================
# If you have calibrated your camera, provide the path to the calibration file
# Generated by calibrate_camera() function from closed_loop_architecture.md
# Format: numpy savez with keys 'camera_matrix' and 'distortion_coefficients'
# camera_calibration: "calibration/camera_calib.npz"

# Uncomment above and provide path if using calibrated camera
# Otherwise, defaults to RPi Camera v3 intrinsics: f=800, cx=320, cy=240

# ============================================================================
# Servo Limits (degrees)
# ============================================================================
# 6x2 array: each row is [min_angle, max_angle] for each servo channel
# Channels: [0] LEFT_ELEVATION, [1] LEFT_AZIMUTH, [2] RIGHT_ELEVATION, 
#           [3] RIGHT_AZIMUTH, [4] TOP_EYELID, [5] BOTTOM_EYELID
servo_limits:
  - [34,80]   # LEFT_ELEVATION
  - [64,132]   # LEFT_AZIMUTH
  - [0,43]   # RIGHT_ELEVATION
  - [32,122]   # RIGHT_AZIMUTH
  - [60, 90]     # TOP_EYELID
  - [120, 150]     # BOTTOM_EYELID

# ============================================================================
# PID Controller Gains
# ============================================================================
# Separate gains for each servo axis
# Typical tuning process:
# 1. Set Ki=Kd=0, increase Kp until oscillation appears
# 2. Reduce Kp by 25%, set Kd to dampen oscillation
# 3. Add Ki to eliminate steady-state error
pid_gains:
  azimuth:
    kp: 0.5
    ki: 0.1
    kd: 0.2
  elevation:
    kp: 0.5
    ki: 0.1
    kd: 0.2

# ============================================================================
# Kalman Filter Parameters
# ============================================================================
# For tracking laser dot positions
kalman_filter:
  process_noise: 0.1        # Q: Higher = faster tracking, less smoothing
  measurement_noise: 1.0    # R: Higher = trust measurements less

# ============================================================================
# Detection Parameters
# ============================================================================
detectors:
  pose:
    confidence_threshold: 0.5
  laser:
    confidence_threshold: 0.5
    use_hsv_filter: true   # Pre-filter with HSV for speed
    hsv_h_min: [0, 170]    # Red hue ranges (in HSV space)
    hsv_h_max: [10, 180]
    hsv_s_min: 100         # Saturation threshold
    hsv_v_min: 100         # Value threshold

# ============================================================================
# Camera Parameters
# ============================================================================
camera:
  width: 640
  height: 480
  fps: 30

# ============================================================================
# Logging
# ============================================================================
logging:
  verbose: false
  save_frames: false
  frame_output_dir: "/tmp/laser_eyes_frames/"
